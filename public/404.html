<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NextGenWebs</title>
    <!--
      GitHub Pages has no server-side rewrites, so a direct visit or refresh
      on a client-side route (e.g. /3D-Portfolio/blog/some-slug/) 404s at
      the host level before React Router ever runs. This is the standard
      SPA-on-GitHub-Pages redirect trick (https://github.com/rafgraph/spa-github-pages):
      encode the intended path into a query string and redirect to the real
      index.html, which decodes it back via history.replaceState before the
      app mounts (see the matching script in index.html).
      pathSegmentsToKeep = 1 because the project is served from /3D-Portfolio/.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
