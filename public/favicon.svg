<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">NextGenWebs Code Symbol</title>
  
  <defs>
    <!-- Glow Filter for the neon slash -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#0F172A"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#1E293B" stroke-width="2"/>

  <!-- Left Bracket < -->
  <path d="M 26 20 L 14 32 L 26 44" 
        fill="none" 
        stroke="#F4F1E8" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Right Bracket > -->
  <path d="M 38 20 L 50 32 L 38 44" 
        fill="none" 
        stroke="#F4F1E8" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Center Slash / -->
  <path d="M 36 14 L 28 50" 
        fill="none" 
        stroke="#B6FF00" 
        stroke-width="5" 
        stroke-linecap="round" 
        filter="url(#neon-glow)"/>
        
  <!-- Subtle Red Accent dot -->
  <circle cx="48" cy="16" r="3" fill="#D9182E"/>
</svg>
